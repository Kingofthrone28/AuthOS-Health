name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: authos_health
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d authos_health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/authos_health
      PAYER_URL: http://localhost:3006

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start mock payer
        run: node apps/mock-payer/dist/index.js > /tmp/mock-payer.log 2>&1 &

      - name: Wait for mock payer
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3006/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "mock-payer did not become ready"
          cat /tmp/mock-payer.log
          exit 1

      - name: Test
        run: npm test
