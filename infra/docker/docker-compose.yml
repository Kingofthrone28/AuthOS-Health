services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authos_health
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/authos_health
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-voice:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker-voice
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      API_URL: http://api:3001
    depends_on:
      - api

  worker-workflow:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker-workflow
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      API_URL: http://api:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/authos_health
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
