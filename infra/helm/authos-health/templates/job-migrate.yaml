{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "authos.fullname" . }}-migrate
  labels:
    {{- include "authos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "authos.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "authos.image" (dict "global" .Values.global "component" .Values.api) }}
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.external.existingSecret }}
                  key: {{ .Values.postgresql.external.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.external.existingSecret }}
                  key: {{ .Values.postgresql.external.secretKeys.password }}
            - name: DATABASE_URL
              value: {{ include "authos.databaseUrl" . | quote }}
          {{- if eq .Values.global.tenantMode "single" }}
            - name: TENANT_MODE
              value: "single"
          envFrom:
            - configMapRef:
                name: {{ include "authos.fullname" . }}-config
          {{- end }}
{{- end }}
