apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authos.fullname" . }}-web
  labels:
    {{- include "authos.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "authos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "authos.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "authos.image" (dict "global" .Values.global "component" .Values.web) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: API_URL
              value: "http://{{ include "authos.fullname" . }}-api:{{ .Values.api.service.port }}"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "authos.fullname" . }}-secrets
                  key: JWT_SECRET
            - name: NEXTAUTH_URL
              {{- if .Values.ingress.enabled }}
              value: "https://{{ .Values.ingress.host }}"
              {{- else }}
              value: "http://{{ include "authos.fullname" . }}-web:{{ .Values.web.service.port }}"
              {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
