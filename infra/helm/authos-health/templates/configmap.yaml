apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "authos.fullname" . }}-config
  labels:
    {{- include "authos.labels" . | nindent 4 }}
data:
  TENANT_MODE: {{ .Values.global.tenantMode | quote }}
  POSTGRES_HOST: {{ .Values.postgresql.external.host | quote }}
  POSTGRES_PORT: {{ .Values.postgresql.external.port | quote }}
  POSTGRES_DB: {{ .Values.postgresql.external.database | quote }}
  REDIS_HOST: {{ .Values.redis.external.host | quote }}
  REDIS_PORT: {{ .Values.redis.external.port | quote }}
  {{- if .Values.sso.enabled }}
  SSO_ISSUER_URL: {{ .Values.sso.issuerUrl | quote }}
  SSO_CLIENT_ID: {{ .Values.sso.clientId | quote }}
  {{- end }}
  {{- if eq .Values.global.tenantMode "single" }}
  TENANT_NAME: {{ .Values.singleTenant.tenantName | quote }}
  TENANT_SLUG: {{ .Values.singleTenant.tenantSlug | quote }}
  ADMIN_EMAIL: {{ .Values.singleTenant.adminEmail | quote }}
  ADMIN_NAME: {{ .Values.singleTenant.adminName | quote }}
  {{- end }}
