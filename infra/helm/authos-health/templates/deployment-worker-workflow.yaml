apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "authos.fullname" . }}-worker-workflow
  labels:
    {{- include "authos.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker-workflow
spec:
  replicas: {{ .Values.workers.workflow.replicas }}
  selector:
    matchLabels:
      {{- include "authos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker-workflow
  template:
    metadata:
      labels:
        {{- include "authos.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker-workflow
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker-workflow
          image: {{ include "authos.image" (dict "global" .Values.global "component" .Values.workers.workflow) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 3003
              protocol: TCP
          env:
            - name: PORT
              value: "3003"
            - name: API_URL
              value: "http://{{ include "authos.fullname" . }}-api:{{ .Values.api.service.port }}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.external.existingSecret }}
                  key: {{ .Values.postgresql.external.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.external.existingSecret }}
                  key: {{ .Values.postgresql.external.secretKeys.password }}
            - name: DATABASE_URL
              value: {{ include "authos.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "authos.redisUrl" . | quote }}
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "authos.fullname" . }}-secrets
                  key: INTERNAL_SECRET
          envFrom:
            - configMapRef:
                name: {{ include "authos.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.workers.workflow.resources | nindent 12 }}
